<!DOCTYPE html>
<html lang="en">

<head>
    {% load i18n %}
    {% get_current_language as LANGUAGE_CODE %}
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% trans "Менеджер задач Hexlet" %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

</head>

<body class="d-flex flex-column min-vh-100">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <h1>{{LANGUAGE_CODE}} {{message1}}</h1>
        <a class="navbar-brand" href="/">{% trans "Менеджер задач" %}</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarToggleExternalContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarToggleExternalContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/users/">{% trans "Пользователи" %}</a>
                </li>

            </ul>
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="/login/">{% trans "Вход" %}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users/create/">{% trans "Регистрация" %}</a>
                </li>

            </ul>
        </div>

    </nav>
    <div class="container wrapper flex-grow-1">
        <h1 class="my-4">
        </h1>
        <h1 class="my-4"></h1>
    </div>
    <footer>
        <div class="container my-5 pt-4 border-top">
            <a target="_blank" href="https://ru.hexlet.io">Hexlet</a>
        </div>
    </footer>
</body>

</html>
